<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f4ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Hebrew Cards" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Hebrew Flashcards</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <h1>Hebrew Cards</h1>
        <p class="subtitle">Tap the card to flip and hear Hebrew.</p>
      </div>
    </header>

    <section class="controls" aria-label="Level controls">
      <label for="levelSelect">Level</label>
      <select id="levelSelect"></select>
    </section>

    <section class="progress" aria-live="polite">
      <span id="levelTitle"></span>
      <span id="cardCounter"></span>
    </section>

    <button id="card" class="card" type="button" aria-label="Flashcard. Tap to flip.">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="side-label">English</div>
          <div id="englishWord" class="word"></div>
          <div id="englishHint" class="hint"></div>
        </div>
        <div class="card-face card-back">
          <div class="side-label">Hebrew</div>
          <div id="hebrewWord" class="word hebrew" dir="rtl"></div>
          <div id="pronunciation" class="hint"></div>
        </div>
      </div>
    </button>

    <section class="audio-row">
      <button id="speakBtn" type="button" class="speaker">🔊 Hear Hebrew</button>
    </section>

    <nav class="bottom-bar" aria-label="Card navigation">
      <button id="prevBtn" type="button">← Back</button>
      <button id="flipBtn" type="button">Flip</button>
      <button id="nextBtn" type="button">Next →</button>
    </nav>
  </main>

  <script src="app.js"></script>
</body>
</html>
